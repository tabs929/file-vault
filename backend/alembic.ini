[alembic]
# Path to the alembic/ directory, relative to where `alembic` is invoked (backend/)
script_location = alembic

# Ensures `from app.core.config import settings` works without installing the package
prepend_sys_path = .

# Overridden at runtime in alembic/env.py from settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/db

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
